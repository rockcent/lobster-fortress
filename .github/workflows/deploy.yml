name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd rockcent/jetseek-ai-official-website
          npm ci

      - name: Build
        run: |
          cd rockcent/jetseek-ai-official-website
          npm run build

      - name: Deploy to Alibaba Cloud
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          KEY_FILE="$RUNNER_TEMP/ssh_key"
          echo "$DEPLOY_SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          tar czf - -C rockcent/jetseek-ai-official-website/dist . | ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i "$KEY_FILE" rockops@$DEPLOY_HOST \
            "sudo rm -rf /usr/share/nginx/ai-marketing.bak && \
             sudo mv /usr/share/nginx/ai-marketing /usr/share/nginx/ai-marketing.bak && \
             sudo mkdir -p /usr/share/nginx/ai-marketing && \
             sudo tar -xzf - -C /usr/share/nginx/ai-marketing/ && \
             sudo chown -R nginx:nginx /usr/share/nginx/ai-marketing && \
             echo 'Frontend deployed'"
          rm -f "$KEY_FILE"
